const norm=s=>s.toLowerCase().replace(/[^a-z0-9]/g,'');

function log(msg,cls='info'){const el=document.getElementById('log');el.innerHTML+=`<div class="${cls}">${msg}</div>`;el.scrollTop=el.scrollHeight;}

async function run(){
  document.querySelector('button').disabled=true;
  document.getElementById('log').innerHTML='';
  log('Carregando dados do Firebase...');
  
  try{
    const doc=await db.collection('crm').doc('state').get();
    if(!doc.exists||!(doc.data().clubs||[]).length){log('❌ Firebase vazio — rode o recuperador primeiro','err');return;}
    
    const data=doc.data();
    let updated=0;
    
    data.clubs.forEach(club=>{
      const cn=norm(club.clubName);
      // Find matching entry in PARTNERS_DATA
      const match=Object.values(PARTNERS_DATA).find(d=>
        norm(d.clubName)===cn ||
        cn.includes(norm(d.clubName).slice(0,6)) ||
        norm(d.clubName).includes(cn.slice(0,6))
      );
      if(!match||!match.partners.length) return;
      
      const existing=club.partners||[];
      const existingNorms=new Set(existing.map(p=>norm(p.name||'')));
      
      match.partners.forEach(sp=>{
        const spn=norm(sp.name);
        if(existingNorms.has(spn)){
          // UPDATE existing partner — enrich empty fields only
          const idx=existing.findIndex(p=>norm(p.name||'')==spn);
          if(idx>=0){
            const rp=existing[idx];
            existing[idx]={...rp,
              cpf:rp.cpf||sp.cpf||"",
              rg:rp.rg||sp.rg||"",
              email:rp.email||sp.email||"",
              phone:rp.phone||sp.phone||"",
              profession:rp.profession||sp.profession||"",
              sex:rp.sex||sp.sex||"",
              maritalStatus:rp.maritalStatus||sp.maritalStatus||"",
              nationality:rp.nationality||sp.nationality||"",
              instagram:rp.instagram||sp.instagram||"",
              linkedin:rp.linkedin||sp.linkedin||"",
              address:(!rp.address?.cidade&&sp.address?.cidade)?sp.address:rp.address
            };
            log(`↻ Sócio atualizado: ${sp.name} (${club.clubName})`, 'ok');
          }
        } else {
          // ADD new partner
          existing.push(sp);
          log(`+ Sócio adicionado: ${sp.name} (${club.clubName})`, 'ok');
        }
        updated++;
      });
      club.partners=existing;
    });
    
    log('\nSalvando no Firebase...');
    await db.collection('crm').doc('state').set(data);
    localStorage.setItem('es_crm_v1', JSON.stringify(data));
    log(`\n✅ CONCLUÍDO! ${updated} sócios atualizados.`,'ok');
    log('Abra o CRM e pressione Ctrl+Shift+R','ok');
  }catch(e){log('Erro: '+e.message,'err');}
  document.querySelector('button').disabled=false;
}
