function norm(s){return s.toLowerCase().replace(/[^a-z]/g,'');}

function log(msg,cls='info'){
  const el=document.getElementById('log');
  el.innerHTML+=`<div class="${cls}">${msg}</div>`;
  el.scrollTop=el.scrollHeight;
}

async function runUpdate(){
  document.getElementById('btn').disabled=true;
  document.getElementById('log').innerHTML='';
  log('Carregando dados do Firebase...');
  
  try{
    const doc = await db.collection('crm').doc('state').get();
    if(!doc.exists){log('❌ Firebase vazio!','err');return;}
    
    const data = doc.data();
    const clubs = data.clubs || [];
    let updated=0, skipped=0, notFound=0;
    
    log(`✓ Firebase carregado: ${clubs.length} clubes`,'ok');
    log('Iniciando atualização de membros...');
    
    clubs.forEach(club=>{
      (club.members||[]).forEach(member=>{
        const nk = norm(member.name||'');
        const upd = UPDATES[nk];
        if(!upd){notFound++;return;}
        
        const p = upd.personal;
        const mp = member.personal || {};
        
        // Update personal data (spreadsheet is source of truth)
        member.personal = {
          ...mp,
          cpf: p.cpf || mp.cpf || "",
          rg: p.rg || mp.rg || "",
          dob: p.dob || mp.dob || "",
          email: p.email || mp.email || "",
          phone: p.phone || mp.phone || "",
          profession: p.profession || mp.profession || "",
          sex: p.sex || mp.sex || "",
          maritalStatus: p.maritalStatus || mp.maritalStatus || "",
          nationality: p.nationality || mp.nationality || "",
          instagram: p.instagram || mp.instagram || "",
          linkedin: p.linkedin || mp.linkedin || "",
          address: (p.address?.cidade && !mp.address?.cidade) ? p.address : (mp.address || p.address || {})
        };
        
        // Update email/phone at root level too
        if(p.email && !member.email) member.email = p.email;
        if(p.phone && !member.phone) member.phone = p.phone;
        
        // Update CX data
        if(upd.cx && Object.keys(upd.cx).length>0){
          const mc = member.cx || {};
          member.cx = {
            ...mc,
            camiseta: upd.cx.camiseta || mc.camiseta || "",
            calca: upd.cx.calca || mc.calca || "",
            calcado: upd.cx.calcado || mc.calcado || "",
            chocolate: upd.cx.chocolate || mc.chocolate || "",
            fruta: upd.cx.fruta || mc.fruta || "",
            moletom: upd.cx.moletom || mc.moletom || "",
            observacoes: upd.cx.observacoes || mc.observacoes || "",
            mainObjective: upd.cx.mainObjective || mc.mainObjective || "",
            crachaName: upd.cx.crachaName || mc.crachaName || member.name,
            emergencyContact: (upd.cx.emergencyContact?.name && !mc.emergencyContact?.name) ? upd.cx.emergencyContact : (mc.emergencyContact || {}),
            children: (upd.cx.children?.length && !mc.children?.length) ? upd.cx.children : (mc.children || [])
          };
        }
        
        log(`✓ ${member.name} (${club.clubName})`, 'ok');
        updated++;
      });
    });
    
    log(`\nSalvando no Firebase...`);
    await db.collection('crm').doc('state').set(data);
    log(`\n✅ CONCLUÍDO! ${updated} membros atualizados, ${notFound} não encontrados na planilha.`,'ok');
    
  }catch(e){
    log('❌ Erro: '+e.message,'err');
  }
  
  document.getElementById('btn').disabled=false;
  document.getElementById('btn').textContent='✓ Concluído — Executar novamente';
}
</script>
</body>
</html>
